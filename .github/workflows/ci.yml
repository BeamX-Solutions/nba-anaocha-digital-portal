name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Placeholders for the whole job (tests import the Supabase client,
      # which requires a URL at module load). Real values live in Vercel;
      # CI only proves the code compiles and the logic passes.
      VITE_SUPABASE_URL: https://placeholder.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: placeholder
      VITE_PAYSTACK_PUBLIC_KEY: pk_test_placeholder
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
